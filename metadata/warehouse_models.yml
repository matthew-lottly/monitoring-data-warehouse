version: 2

sources:
  - name: staging_readings
    description: Raw operational monitoring readings loaded from the station CSV extract.
    loaded_at_field: observed_at
    sla:
      freshness:
        query: |
          SELECT MAX(strptime(observed_at, '%Y-%m-%dT%H:%M:%SZ'))
          FROM staging_readings
        max_lag_hours_from_freshest: 0
      completeness:
        required_fields:
          - station_id
          - station_name
          - observed_at
          - status
  - name: staging_station_attribute_history
    description: Station ownership and response-tier history used for the slowly changing dimension example.
    loaded_at_field: effective_from
    sla:
      freshness:
        query: |
          SELECT MAX(strptime(COALESCE(effective_to, effective_from), '%Y-%m-%dT%H:%M:%SZ'))
          FROM staging_station_attribute_history
        max_lag_hours_from_freshest: 432
      completeness:
        required_fields:
          - station_id
          - station_name
          - owner_team
          - effective_from

models:
  - name: dim_station
    description: Canonical station dimension with one row per station identifier.
    grain: one row per station_id
    depends_on:
      - staging_readings
    contract:
      checks:
        - name: unique_station_id
          expected: 0
          query: |
            SELECT COUNT(*)
            FROM (
              SELECT station_id
              FROM dim_station
              GROUP BY station_id
              HAVING COUNT(*) > 1
            )
        - name: non_null_station_names
          expected: 0
          query: SELECT COUNT(*) FROM dim_station WHERE station_name IS NULL

  - name: dim_station_attribute_history
    description: Type 2 history for owner-team and response-tier changes.
    grain: one row per station_id and effective_from pair
    depends_on:
      - staging_station_attribute_history
    contract:
      checks:
        - name: at_most_one_current_row_per_station
          expected: 0
          query: |
            SELECT COUNT(*)
            FROM (
              SELECT station_id
              FROM dim_station_attribute_history
              WHERE is_current
              GROUP BY station_id
              HAVING COUNT(*) > 1
            )

  - name: dim_region
    description: Reference dimension for reporting regions.
    grain: one row per region_name
    depends_on:
      - staging_readings
    contract:
      checks:
        - name: unique_region_name
          expected: 0
          query: |
            SELECT COUNT(*)
            FROM (
              SELECT region_name
              FROM dim_region
              GROUP BY region_name
              HAVING COUNT(*) > 1
            )

  - name: dim_category
    description: Reference dimension for station monitoring categories.
    grain: one row per category_name
    depends_on:
      - staging_readings
    contract:
      checks:
        - name: unique_category_name
          expected: 0
          query: |
            SELECT COUNT(*)
            FROM (
              SELECT category_name
              FROM dim_category
              GROUP BY category_name
              HAVING COUNT(*) > 1
            )

  - name: fact_observation
    description: Atomic observation fact joined to the warehouse dimensions.
    grain: one row per station observation
    depends_on:
      - dim_station
      - dim_region
      - dim_category
      - staging_readings
    contract:
      checks:
        - name: non_null_dimension_keys
          expected: 0
          query: |
            SELECT COUNT(*)
            FROM fact_observation
            WHERE station_key IS NULL OR region_key IS NULL OR category_key IS NULL
        - name: valid_status_values
          expected: 0
          query: |
            SELECT COUNT(*)
            FROM fact_observation
            WHERE status NOT IN ('alert', 'normal', 'offline')

  - name: mart_alert_station_daily
    description: Daily alert station mart for operational escalation reviews.
    grain: one row per station_id and observation_date when alerts occurred
    depends_on:
      - fact_observation
      - dim_station
      - dim_region
      - dim_category
    contract:
      checks:
        - name: positive_alert_counts
          expected: 0
          query: SELECT COUNT(*) FROM mart_alert_station_daily WHERE alert_count <= 0

  - name: mart_region_status_daily
    description: Daily regional status mart for quick operating summaries.
    grain: one row per region_name, status, and observation_date
    depends_on:
      - fact_observation
      - dim_region
    contract:
      checks:
        - name: valid_region_status_values
          expected: 0
          query: |
            SELECT COUNT(*)
            FROM mart_region_status_daily
            WHERE status NOT IN ('alert', 'normal', 'offline')