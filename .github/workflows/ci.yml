name: Monitoring Data Warehouse CI

"on":
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Build warehouse artifact
        run: python -m monitoring_data_warehouse.builder

      - name: Upload warehouse build artifact
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-build-summary
          path: artifacts/warehouse-build-summary.json